<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1b3d29" />
    <title>Offline — Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/offline.css" />
  </head>
  <body>
    <div class="splash-login offline-fallback">
      <div class="login-card">
        <div class="splash-top">
          <div class="splash-logo-row">
            <div class="splash-logo-mark">
              <img
                src="/assets/images/edit_white.png"
                alt=""
                width="18"
                height="18"
              />
            </div>
            <span class="splash-logo-text">Notes</span>
          </div>
        </div>
        <h1 class="login-card-title">You’re offline</h1>
        <p class="offline-message">We couldn’t load this page.</p>
        <p class="offline-message">Check your connection, then try again.</p>
        <button type="button" class="btn-login" id="retry">Try again</button>
      </div>
    </div>
    <script>
      document.getElementById("retry").onclick = function () {
        window.location.reload();
      };
      window.addEventListener("online", function () {
        window.location.reload();
      });
    </script>
  </body>
</html>
